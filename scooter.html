<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scooter</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/cars.css" />
  </head>

  <body>
    <header class="header">
    </header>
    <!-- start header -->
    <div class="blank"></div>
    <div class="container">
      <!-- Card 1 -->
      <div class="card">
        <span class="badge">Economy</span>
        <img
          src="https://media.almalnews.com/2019/12/large/ubermoto.png"
          alt=""
        />
        <div class="info">
          <h3>Economy Sedan</h3>
          <div class="meta">
            <span>$1.20/km</span>
            <span>⏱ 3 min</span>
          </div>
          <button class="btn"><a href="reservation.html">Book Now</a></button>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="card">
        <span class="badge">Premium</span>
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQepPGr1iESqxk6p6oZRpRJOQmVcfjM4Uk_GQ&s"
          alt=""
        />
        <div class="info">
          <h3>Premium SUV</h3>
          <div class="meta">
            <span>$2.50/km</span>
            <span>⏱ 5 min</span>
          </div>
          <button class="btn"><a href="reservation.html">Book Now</a></button>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="card">
        <span class="badge">Family</span>
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQikSFwwi-KazwnPZcrbGssAbwQoxgx0gjRiQ&s"
          alt=""
        />
        <div class="info">
          <h3>Family Van</h3>
          <div class="meta">
            <span>$3.00/km</span>
            <span>⏱ 8 min</span>
          </div>
          <button class="btn"><a href="reservation.html">Book Now</a></button>
        </div>
      </div>

      <!-- Card 4 -->
      <div class="card">
        <span class="badge">Business</span>
        <img
          src="https://ottoscooter.co.uk/wp-content/uploads/2023/10/Uber_NIU_wall-1024x637.jpg"
          alt=""
        />
        <div class="info">
          <h3>Business Class</h3>
          <div class="meta">
            <span>$3.50/km</span>
            <span>⏱ 6 min</span>
          </div>
          <button class="btn"><a href="reservation.html">Book Now</a></button>
        </div>
      </div>

      <!-- Card 5 -->
      <div class="card">
        <span class="badge">Luxury</span>
        <img
          src="https://ottoscooter.co.uk/wp-content/uploads/2023/10/Uber_VmotoCPx_wall2-1024x637.jpg"
          alt=""
        />
        <div class="info">
          <h3>Luxury SUV</h3>
          <div class="meta">
            <span>$5.00/km</span>
            <span>⏱ 10 min</span>
          </div>
          <button class="btn"><a href="reservation.html">Book Now</a></button>
        </div>
      </div>

      <!-- Card 6 -->
      <div class="card">
        <span class="badge">Special</span>
        <img
          src="https://www.e-motionsharing.it/wp-content/uploads/2023/05/CPXproblack.webp"
          alt=""
        />
        <div class="info">
          <h3>Party Van</h3>
          <div class="meta">
            <span>$4.00/km</span>
            <span>⏱ 12 min</span>
          </div>
          <button class="btn"><a href="reservation.html">Book Now</a></button>
        </div>
      </div>
    </div>

    <!-- start footer -->
    <footer class="footer"></footer>
    <!-- end footer -->
     <script src="js/footer.js"></script>
    <script src="js/header.js"></script>
  </body>
</html>
