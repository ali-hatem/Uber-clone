<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <!-- font awesome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <!-- css -->
    <link rel="stylesheet" href="css/contact.css" />
  </head>

  <body>
    <!-- start header -->
    <header class="header"></header>
    <!-- end header -->

    <!-- title -->
    <div class="title">
      <h1>Contact Us</h1>
      <p>Have a question? We'd love to hear from you.</p>
    </div>

    <!-- start content -->
    <div class="content">
      <!-- form to contact us -->
      <form action="" method="post">
        <div class="card">
          <div class="card-title">Send a Message</div>
          <div class="username">
            <input type="text" placeholder="First name" />
            <input type="text" placeholder="Last name" />
          </div>
          <div class="email">
            <input type="email" placeholder="Email address" />
          </div>
          <div class="subject">
            <input type="text" placeholder="Subject" />
          </div>
          <div class="message">
            <textarea placeholder="Your message..."></textarea>
          </div>
          <button class="btn-send">Send Message</button>
        </div>
      </form>

      <!-- start right side -->
      <div class="right-col">
        <!-- start support info -->
        <div class="card">
          <div class="card-title">Support Info</div>

          <div class="support-item">
            <div class="icons-wrap">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <path d="m22 7-10 7L2 7" />
              </svg>
            </div>
            <div>
              <div class="support-label">Email</div>
              <div class="support-value">support@ridego.com</div>
            </div>
          </div>

          <div class="support-item">
            
            <div>
              <div class="support-label">Phone</div>
              <div class="support-value">+1 (555) 123-4567</div>
            </div>
          </div>

          <div class="support-item">
            
            <div>
              <div class="support-label">Address</div>
              <div class="support-value">123 Market St, San Francisco, CA</div>
            </div>
          </div>

          <div class="support-item">
            
            <div>
              <div class="support-label">Hours</div>
              <div class="support-value">24/7 Support</div>
            </div>
          </div>
        </div>
        <!-- end support info -->

        <!-- start Map -->
        <div class="map-placeholder">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3451.624563264985!2d31.348527376176374!3d30.10493691570089!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x145815005897870b%3A0x8310348f5975f10c!2z2KfZhNmD2YTZitipINin2YTYrdix2KjZitmHINi02KfYsdi5INi52KvZhdin2YYg2KjZhiDYudmB2KfZhiDZiNmB2LHZitivINiz2YXZitmD2Kkg2KjZiNin2KjYqSA1!5e0!3m2!1sen!2seg!4v1772371003614!5m2!1sen!2seg"
            width="300"
            height="450"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
        <!-- end Map -->

        <!-- start follow us -->
        <div class="card">
          <div class="card-title">Follow Us</div>
          <div class="follow-row">
            <!-- Facebook -->
            <div class="social-btn">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"
                />
              </svg>
            </div>
            <!-- Twitter -->
            <div class="social-btn">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"
                />
              </svg>
            </div>
            <!-- Instagram -->
            <div class="social-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="2" width="20" height="20" rx="5" />
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
              </svg>
            </div>
            <!-- LinkedIn -->
            <div class="social-btn">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"
                />
                <rect x="2" y="9" width="4" height="12" />
                <circle cx="4" cy="4" r="2" />
              </svg>
            </div>
          </div>
        </div>
        <!-- end follow us -->
      </div>
    </div>
    <!-- end content -->

    <!-- start footer -->
    <footer class="footer"></footer>
    <!-- end footer -->
    <script src="js/footer.js"></script>
    <script src="js/header.js"></script>
  </body>
</html>
