  <body>
    <!-- <header class="header"></header> -->
          <div class="content">
        <h1>Book Your Ride</h1>
        <p>Fill in the details and confirm your booking</p>
       
      </div>
      <div class="reservation">
       <div class="reservation-form">        
      <form action="" method="post" class="login-form">
        <label for="">Trip Details</label><br><br>
        <div class="input-container">
        <i class="fa-solid fa-location-arrow"></i>
          <input
            type="text"
            id="Pickup-location"
            name="location"
            placeholder="Pickup location"
          />
          <br />
          <br />
        <i class="fa-solid fa-location-dot"></i>
          <input
            type="text"
            id="Drop-location"
            name="Drop-location"
            placeholder="Drop-off location"
          />
          <br />
          <br />
        <i class="fa-solid fa-calendar-days"></i>
          <input
            type="date"
            id="date"
            name="date"
            placeholder="Date"
          />      <br /><br />
          <i class="fa-regular fa-clock"></i>
          <input
            type="time"
            id="time"
            name="Time"
            placeholder="Time"
          />
          
        </div>
        <div class="payment-container">
        <h3>Payment Method</h3>

        <label class="payment-option">
          <input type="radio" name="payment" id="creditCard">
          <span class="custom-radio"></span>
          <span class="icon"><i class="fa-brands fa-cc-visa"></i></span>
          <span>Credit Card</span>
        </label>

        <label class="payment-option">
          <input type="radio" name="payment" id="wallet">
          <span class="custom-radio"></span>
          <span class="icon"><i class="fa-solid fa-wallet"></i></span>
          <span>Digital Wallet</span>
        </label>

        <label class="payment-option">
          <input type="radio" name="payment" id="cash">
          <span class="custom-radio"></span>
          <span class="icon"><i class="fa-brands fa-cash-app"></i></span>
          <span>Cash</span>
        </label>
      </div>


        <br>
      <button class="book" type="button" onclick="getData()">Confirm Booking</button>

      </form>
    </div>
